<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Калькулятор</title>
  <script>
    (function () {
      var t = localStorage.getItem('calc-theme');
      document.documentElement.dataset.theme = (t === 'light' || t === 'dark') ? t : 'dark';
    })();
  </script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root,
    [data-theme="dark"] {
      --bg-gradient: linear-gradient(145deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      --calc-bg: #1e1e2f;
      --calc-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
      --display-bg: #12121c;
      --expr-color: #6b7280;
      --value-color: #f3f4f6;
      --digit-bg: #2d2d44;
      --digit-hover: #3d3d5c;
      --digit-color: #e5e7eb;
      --fn-bg: #374151;
      --fn-hover: #4b5563;
      --fn-color: #d1d5db;
      --theme-btn-bg: #f5f2ea;
      --theme-btn-shadow: 0 2px 10px rgba(0, 0, 0, 0.35);
      --toggle-track: #374151;
      --toggle-thumb: #f3f4f6;
    }

    [data-theme="light"] {
      --bg-gradient: linear-gradient(145deg, #e0e7ff 0%, #dbeafe 50%, #bfdbfe 100%);
      --calc-bg: #ffffff;
      --calc-shadow: 0 20px 50px rgba(15, 23, 42, 0.12);
      --display-bg: #f1f5f9;
      --expr-color: #64748b;
      --value-color: #0f172a;
      --digit-bg: #e2e8f0;
      --digit-hover: #cbd5e1;
      --digit-color: #1e293b;
      --fn-bg: #cbd5e1;
      --fn-hover: #94a3b8;
      --fn-color: #334155;
      --theme-btn-bg: #fffef9;
      --theme-btn-shadow: 0 2px 8px rgba(15, 23, 42, 0.15);
      --toggle-track: #cbd5e1;
      --toggle-thumb: #ffffff;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg-gradient);
      transition: background 0.3s ease;
    }

    .calculator {
      width: min(320px, 92vw);
      background: var(--calc-bg);
      border-radius: 16px;
      padding: 20px;
      box-shadow: var(--calc-shadow);
      transition: background 0.3s ease, box-shadow 0.3s ease;
    }

    .theme-bar {
      display: grid;
      grid-template-columns: 34px 1fr 52px;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .theme-btn {
      width: 34px;
      height: 34px;
      padding: 0;
      border: none;
      border-radius: 50%;
      background: var(--theme-btn-bg);
      box-shadow: var(--theme-btn-shadow);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.05rem;
      line-height: 1;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.3s ease;
    }

    .theme-btn:hover {
      box-shadow: 0 3px 12px rgba(0, 0, 0, 0.3);
    }

    .theme-btn:active {
      transform: scale(0.92);
    }

    .theme-label {
      text-align: center;
      font-size: 0.8rem;
      color: var(--expr-color);
      transition: color 0.3s ease;
    }

    .theme-toggle {
      position: relative;
      width: 52px;
      height: 28px;
      padding: 0;
      border: none;
      border-radius: 14px;
      background: var(--toggle-track);
      cursor: pointer;
      justify-self: end;
      transition: background 0.3s ease;
    }

    .theme-toggle::before {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--toggle-thumb);
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);
      transition: transform 0.25s ease;
    }

    [data-theme="light"] .theme-toggle::before {
      transform: translateX(24px);
    }

    .theme-toggle-icon {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.85rem;
      line-height: 1;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .theme-icon-dark {
      left: 7px;
      opacity: 1;
    }

    .theme-icon-light {
      right: 7px;
      opacity: 0.35;
    }

    [data-theme="light"] .theme-icon-dark {
      opacity: 0.35;
    }

    [data-theme="light"] .theme-icon-light {
      opacity: 1;
    }

    .display {
      background: var(--display-bg);
      border-radius: 10px;
      padding: 16px 14px;
      margin-bottom: 16px;
      text-align: right;
      min-height: 72px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      transition: background 0.3s ease;
    }

    .display-expression {
      color: var(--expr-color);
      font-size: 0.85rem;
      min-height: 1.2em;
      word-break: break-all;
      transition: color 0.3s ease;
    }

    .display-value {
      color: var(--value-color);
      font-size: 2rem;
      font-weight: 300;
      word-break: break-all;
      line-height: 1.2;
      transition: color 0.3s ease;
    }

    .keys {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 18px 0;
      font-size: 1.15rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      font-family: inherit;
    }

    button:active {
      transform: scale(0.96);
    }

    .btn-digit {
      background: var(--digit-bg);
      color: var(--digit-color);
      transition: background 0.2s ease, color 0.3s ease;
    }

    .btn-digit:hover {
      background: var(--digit-hover);
    }

    .btn-op {
      background: #e94560;
      color: #fff;
    }

    .btn-op:hover {
      background: #ff6b6b;
    }

    .btn-fn {
      background: var(--fn-bg);
      color: var(--fn-color);
      transition: background 0.2s ease, color 0.3s ease;
    }

    .btn-fn:hover {
      background: var(--fn-hover);
    }

    .btn-clear {
      background: #dc2626;
      color: #fff;
    }

    .btn-clear:hover {
      background: #ef4444;
    }

    .btn-equals {
      background: #0ea5e9;
      color: #fff;
    }

    .btn-equals:hover {
      background: #38bdf8;
    }

    .span-2 {
      grid-column: span 2;
    }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="theme-bar">
      <button type="button" class="theme-btn" id="themeBtn" aria-label="Переключить светлую и тёмную тему">
        <span id="themeIcon">🌙</span>
      </button>
      <span class="theme-label" id="themeLabel">Тёмная тема</span>
      <button type="button" class="theme-toggle" id="themeToggle" aria-label="Переключить светлую и тёмную тему" aria-pressed="false">
        <span class="theme-toggle-icon theme-icon-dark" aria-hidden="true">🌙</span>
        <span class="theme-toggle-icon theme-icon-light" aria-hidden="true">☀️</span>
      </button>
    </div>
    <div class="display">
      <div class="display-expression" id="expression"></div>
      <div class="display-value" id="value">0</div>
    </div>
    <div class="keys">
      <button type="button" class="btn-fn btn-clear" data-action="clear">C</button>
      <button type="button" class="btn-fn" data-action="backspace">⌫</button>
      <button type="button" class="btn-fn" data-action="percent">%</button>
      <button type="button" class="btn-op" data-action="operator" data-op="/">÷</button>

      <button type="button" class="btn-digit" data-action="digit" data-digit="7">7</button>
      <button type="button" class="btn-digit" data-action="digit" data-digit="8">8</button>
      <button type="button" class="btn-digit" data-action="digit" data-digit="9">9</button>
      <button type="button" class="btn-op" data-action="operator" data-op="*">×</button>

      <button type="button" class="btn-digit" data-action="digit" data-digit="4">4</button>
      <button type="button" class="btn-digit" data-action="digit" data-digit="5">5</button>
      <button type="button" class="btn-digit" data-action="digit" data-digit="6">6</button>
      <button type="button" class="btn-op" data-action="operator" data-op="-">−</button>

      <button type="button" class="btn-digit" data-action="digit" data-digit="1">1</button>
      <button type="button" class="btn-digit" data-action="digit" data-digit="2">2</button>
      <button type="button" class="btn-digit" data-action="digit" data-digit="3">3</button>
      <button type="button" class="btn-op" data-action="operator" data-op="+">+</button>

      <button type="button" class="btn-digit span-2" data-action="digit" data-digit="0">0</button>
      <button type="button" class="btn-digit" data-action="decimal">,</button>
      <button type="button" class="btn-equals" data-action="equals">=</button>
    </div>
  </div>

  <script>
    const valueEl = document.getElementById('value');
    const expressionEl = document.getElementById('expression');
    const themeBtn = document.getElementById('themeBtn');
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('themeIcon');
    const themeLabel = document.getElementById('themeLabel');
    const THEME_KEY = 'calc-theme';

    function getTheme() {
      return document.documentElement.dataset.theme === 'light' ? 'light' : 'dark';
    }

    function applyTheme(theme) {
      document.documentElement.dataset.theme = theme;
      localStorage.setItem(THEME_KEY, theme);
      const isLight = theme === 'light';
      const icon = isLight ? '🌙' : '☀️';
      themeToggle.setAttribute('aria-pressed', String(isLight));
      themeIcon.textContent = icon;
      themeLabel.textContent = isLight ? 'Светлая тема' : 'Тёмная тема';
    }

    function toggleTheme() {
      applyTheme(getTheme() === 'dark' ? 'light' : 'dark');
    }

    applyTheme(getTheme());

    themeBtn.addEventListener('click', toggleTheme);
    themeToggle.addEventListener('click', toggleTheme);

    const state = {
      current: '0',
      previous: null,
      operator: null,
      waitingForOperand: false,
      expression: ''
    };

    const OP_SYMBOLS = { '+': '+', '-': '−', '*': '×', '/': '÷' };
    const DECIMAL = ',';

    function formatNumber(num) {
      if (!Number.isFinite(num)) return 'Ошибка';
      return Number(num).toLocaleString('ru-RU', {
        useGrouping: false,
        maximumFractionDigits: 10
      });
    }

    function toDisplay(str) {
      return String(str).replace(/\./g, DECIMAL);
    }

    function parseCurrent() {
      return parseFloat(state.current.replace(DECIMAL, '.')) || 0;
    }

    function updateDisplay() {
      valueEl.textContent = toDisplay(state.current);
      expressionEl.textContent = toDisplay(state.expression);
    }

    function clear() {
      state.current = '0';
      state.previous = null;
      state.operator = null;
      state.waitingForOperand = false;
      state.expression = '';
      updateDisplay();
    }

    function inputDigit(digit) {
      if (state.waitingForOperand) {
        state.current = digit;
        state.waitingForOperand = false;
      } else {
        state.current = state.current === '0' ? digit : state.current + digit;
      }
      updateDisplay();
    }

    function inputDecimal() {
      if (state.waitingForOperand) {
        state.current = '0' + DECIMAL;
        state.waitingForOperand = false;
        updateDisplay();
        return;
      }
      if (!state.current.includes(DECIMAL)) {
        state.current += DECIMAL;
        updateDisplay();
      }
    }

    function compute(a, b, op) {
      switch (op) {
        case '+': return a + b;
        case '-': return a - b;
        case '*': return a * b;
        case '/': return b === 0 ? NaN : a / b;
        default: return b;
      }
    }

    function applyOperator(nextOp) {
      const currentVal = parseCurrent();

      if (state.operator !== null && !state.waitingForOperand) {
        const result = compute(state.previous, currentVal, state.operator);
        if (Number.isNaN(result)) {
          state.current = 'Ошибка';
          state.previous = null;
          state.operator = null;
          state.expression = '';
          state.waitingForOperand = true;
          updateDisplay();
          return;
        }
        state.previous = result;
        state.current = formatNumber(result);
        state.expression = formatNumber(result) + ' ' + OP_SYMBOLS[nextOp];
      } else {
        state.previous = currentVal;
        state.expression = formatNumber(currentVal) + ' ' + OP_SYMBOLS[nextOp];
      }

      state.operator = nextOp;
      state.waitingForOperand = true;
      updateDisplay();
    }

    function equals() {
      if (state.operator === null || state.waitingForOperand) return;

      const currentVal = parseCurrent();
      const result = compute(state.previous, currentVal, state.operator);

      if (Number.isNaN(result)) {
        state.current = 'Ошибка';
        state.expression = '';
      } else {
        const prevSym = OP_SYMBOLS[state.operator];
        state.expression =
          formatNumber(state.previous) + ' ' + prevSym + ' ' + formatNumber(currentVal) + ' =';
        state.current = formatNumber(result);
        state.previous = null;
        state.operator = null;
      }

      state.waitingForOperand = true;
      updateDisplay();
    }

    function backspace() {
      if (state.current === 'Ошибка' || state.waitingForOperand) {
        clear();
        return;
      }
      if (state.current.length <= 1) {
        state.current = '0';
      } else {
        state.current = state.current.slice(0, -1);
      }
      updateDisplay();
    }

    function percent() {
      const val = parseCurrent() / 100;
      state.current = formatNumber(val);
      updateDisplay();
    }

    document.querySelector('.keys').addEventListener('click', (e) => {
      const btn = e.target.closest('button');
      if (!btn) return;

      const action = btn.dataset.action;

      if (action === 'digit') {
        inputDigit(btn.dataset.digit);
      } else if (action === 'decimal') {
        inputDecimal();
      } else if (action === 'operator') {
        if (state.current !== 'Ошибка') {
          applyOperator(btn.dataset.op);
        }
      } else if (action === 'equals') {
        equals();
      } else if (action === 'clear') {
        clear();
      } else if (action === 'backspace') {
        backspace();
      } else if (action === 'percent') {
        if (state.current !== 'Ошибка') percent();
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key >= '0' && e.key <= '9') {
        inputDigit(e.key);
      } else if (e.key === ',' || e.key === '.') {
        inputDecimal();
      } else if (e.key === '+') {
        applyOperator('+');
      } else if (e.key === '-') {
        applyOperator('-');
      } else if (e.key === '*') {
        applyOperator('*');
      } else if (e.key === '/') {
        e.preventDefault();
        applyOperator('/');
      } else if (e.key === 'Enter' || e.key === '=') {
        equals();
      } else if (e.key === 'Escape') {
        clear();
      } else if (e.key === 'Backspace') {
        backspace();
      } else if (e.key === '%') {
        percent();
      }
    });
  </script>
</body>
</html>
